<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Redirection automatique -->
  <meta http-equiv="refresh" content="4;url=https://laraplay.vercel.app" />

  <title>LFIAGtube devient LARAPLAY</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;

      background:
        radial-gradient(circle at top, rgba(229, 9, 20, 0.18), transparent 40%),
        #000;
    }

    .card {
      width: 100%;
      max-width: 560px;
      padding: 48px 32px;

      border-radius: 28px;
      background: rgba(15, 15, 15, 0.9);
      border: 1px solid rgba(255,255,255,0.12);

      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    }

    .logo {
      width: 120px;
      height: 120px;
      border-radius: 28px;
      margin-bottom: 28px;
      box-shadow: 0 10px 40px rgba(229, 9, 20, 0.3);
    }

    h1 {
      font-size: clamp(32px, 6vw, 54px);
      letter-spacing: 0.08em;
      color: #e50914;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    p {
      font-size: 16px;
      color: #cfcfcf;
      line-height: 1.5;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 14px 28px;
      border-radius: 999px;
      background: #e50914;
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: all 0.2s ease;
    }

    .btn:hover {
      background: #f6121d;
      transform: scale(1.05);
    }

    .footer {
      margin-top: 25px;
      font-size: 13px;
      color: #777;
    }
  </style>
</head>

<body>
  <main class="card">

    <!-- LOGO PWA - NON MODIFIÉ -->
    <img 
      class="logo" 
      src="./IMG_2259.png" 
      alt="LARAPLAY"
      onerror="this.style.display='none'"
    />

    <!-- TITRE -->
    <h1>LARAPLAY</h1>

    <!-- MESSAGE -->
    <h2>LFIAGtube n’est plus disponible</h2>

    <p>
      La plateforme a évolué vers une expérience plus moderne et performante.<br>
      Vous allez être redirigé automatiquement.
    </p>

    <!-- BOUTON -->
    <a class="btn" href="https://laraplay.vercel.app">
      Accéder à LARAPLAY
    </a>

    <!-- FOOTER -->
    <div class="footer">
      Redirection automatique dans quelques secondes…
    </div>

  </main>
</body>
</html>
