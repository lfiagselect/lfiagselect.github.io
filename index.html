<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="4;url=https://laraplay.vercel.app" />
  <title>LFIAGtube devient LARAPLAY</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(229, 9, 20, 0.18), transparent 35%),
        #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 560px;
      padding: 48px 32px;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 28px;
      background: rgba(15,15,15,0.88);
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    }

    .logo {
      width: 120px;
      height: 120px;
      border-radius: 28px;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(32px, 6vw, 54px);
      letter-spacing: 0.08em;
      color: #e50914;
    }

    h2 {
      margin: 0 0 24px;
      font-size: 24px;
      font-weight: 600;
    }

    p {
      margin: 0 auto 28px;
      max-width: 420px;
      color: #cfcfcf;
      line-height: 1.55;
      font-size: 17px;
    }

    a {
      display: inline-block;
      padding: 15px 28px;
      border-radius: 999px;
      background: #e50914;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      transition: transform .2s ease, background .2s ease;
    }

    a:hover {
      background: #f6121d;
      transform: scale(1.03);
    }

    .small {
      margin-top: 26px;
      font-size: 13px;
      color: #777;
    }
  </style>
</head>

<body>
  <main class="card">
    <img class="logo" src="logo-pwa.png" alt="LARAPLAY" />

    <h1>LARAPLAY</h1>

    <h2>LFIAGtube n’est plus disponible</h2>

    <p>
      La plateforme a évolué vers une nouvelle expérience plus moderne.
      Vous allez être redirigé automatiquement vers LARAPLAY.
    </p>

    <a href="https://laraplay.vercel.app">
      Accéder à LARAPLAY
    </a>

    <div class="small">
      Redirection automatique dans quelques secondes…
    </div>
  </main>
</body>
</html>
